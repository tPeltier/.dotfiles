unbind C-b
set -g prefix C-Space
# set -g default-terminal "rxvt-256color";
set -g default-terminal "kitty";

unbind r
#bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display "Reloaded tmux conf"
bind r source-file $HOME/.config/tmux/tmux.conf \; display "Reloaded tmux conf"

# v and h are not binded by default, but we never know in the next versions
unbind v
unbind h

unbind % # Split vertically
unbind '"' # Split horizontally
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

set -g history-limit 10000

set -g mouse on

unbind n #DEFAULT KEY: Move to next window
unbind w #DEFAULT KEY: change current window interactively

bind n command-prompt "rename-window '%%'"
bind w new-window -c "#{pane_current_path}"

set -g base-index 1
set-window-option -g pane-base-index 1

# Go through every window with ALT+k and ALT+j
bind -n M-j previous-window
bind -n M-k next-window

set-window-option -g mode-keys vi

# Copy paste
unbind -T copy-mode-vi Space; #Default for begin-selection
unbind -T copy-mode-vi Enter; #Default for copy-selection

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel --clipboard"

# Fix cursor in Neovim
set -g -a terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q' 

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
| grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Make a smaller delay so we can perform commands after switching windows
set -sg escape-time 0
set -sg repeat-time 600

##########
# DESIGN #
##########

# panes
set -g pane-border-style bg=brightblack,fg=black
set -g pane-active-border-style bg=brightblack,fg=red
set -g pane-border-lines single
set -g pane-border-indicators colour

# status line
set -g status-interval 2
set -g status-justify left
set -g status-keys vi
set -g status-left ""
set -g status-left-length 20
set -g status-position bottom
set -g status-right "#{?client_prefix,#[fg=red]prefix pressed ..,#[fg=white]#H} "
set -g status-right-length 50
set -g status-style bg=brightblack,fg=red

# windows
setw -g window-status-bell-style bg=yellow,fg=white,bold
setw -g window-status-style bg=brightblack,fg=magenta,none
setw -g window-status-format ' #I#[fg=green]:#[fg=white]#W#[fg=yellow]#F '
setw -g window-status-current-style bg=brightblack,fg=red,bold
setw -g window-status-current-format ' #I#[fg=green]:#[fg=brightwhite]#W#[fg=blue]#F '

# About #F (window_flags)
# *: Denotes the current window you are actively viewing.
# -: Marks the last window that was previously selected.
# #: Indicates that the window is being monitored for activity, and activity has been detected.
# !: Signifies that the window is being monitored for a bell event, and a bell has occurred.
# ~: Shows that the window has been silent for the duration of the monitor-silence interval.
# M: The window contains the marked pane.
# Z: The window's active pane is currently zoomed

# The modes
setw -g mode-style bg=green,fg=black,bold
setw -g mode-keys vi

# The messages
set -g message-style bg=yellow,fg=black,bold
set -g message-command-style bg=green,fg=black,bold

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

